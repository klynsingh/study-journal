<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <link rel="manifest" href="assets/site.webmanifest">
    <title>New Session • Study Journal</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navigation -->

    <header class="navbar">
        <a href="index.html" class="logo">
            📘 <span>Study Journal</span>
        </a>

        <nav class="nav-links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="session.html">New Session</a>
            <a href="history.html">History</a>
        </nav>

    </header>


    <main class="container">

        <!-- Hero -->

        <section class="hero">

            <div>

                <h1>New Session</h1>

                <p>

                    Record your completed study, research, coding, or reading session.

                </p>

            </div>

        </section>


        <!-- Session Details -->

        <section class="card">

            <h2>Session Details</h2>

            <div class="form-grid">

                <div class="form-group">

                    <label for="category">Category</label>

                    <select id="category"></select>

                </div>


                <div class="form-group">

                    <label for="activity">Activity</label>

                    <select id="activity"></select>

                </div>


                <div class="form-group">

                    <label for="subject">Subject / Project</label>

                   <select id="area"></select>

                </div>


                <div class="form-group">

                    <label for="topic">Topic</label>

                    <input
                        type="text"
                        id="topic"
                        placeholder="18-Electron Rule">

                </div>

            </div>

        </section>



        <!-- Time Information -->

        <section class="card">

            <h2>Time</h2>

            <div class="form-grid">

                <div class="form-group">

                    <label for="date">Date</label>

                    <input
                        type="date"
                        id="date">

                </div>


                <div class="form-group">

                    <label for="startTime">Start Time</label>

                    <input
                        type="time"
                        id="startTime">

                </div>


                <div class="form-group">

                    <label for="endTime">End Time</label>

                    <input
                        type="time"
                        id="endTime">

                </div>


                <div class="form-group">

                    <label for="duration">Duration</label>

                    <input
                        type="text"
                        id="duration"
                        value="0 h 0 min"
                        readonly>

                </div>

            </div>

        </section>



        <!-- Notes -->

        <section class="card">

            <h2>Notes</h2>

            <div class="form-group">

                <label for="notes">

                    Additional Notes

                </label>

                <textarea

                    id="notes"

                    rows="6"

                    placeholder="Write anything useful about this session..."></textarea>

            </div>

        </section>



        <!-- Save Button -->

        <section class="save-section">

            <button id="saveBtn" class="button">

                💾 Save Session

            </button>

        </section>

    </main>



    <footer>

        <p>

            Study Journal • Version 1.0.0

        </p>

    </footer>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/session.js"></script>

</body>

</html>
